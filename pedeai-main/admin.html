<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Geral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #2b2d42; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .panel { background: #3d405b; padding: 40px; border-radius: 20px; text-align: center; width: 400px; }
    </style>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="panel">
        <a href="index.html" class="btn-loja">
         🍔 Tonho Lanches - Abrir Loja
        </a>
        <p>Controle de Acesso</p>
        <hr>
        <div class="mb-4">
            <p>Status da Hamburgueria "tonho churrascos":</p>
            <h4 id="status-label">ATIVO</h4>
        </div>
        <button id="btn-toggle" class="btn btn-lg w-100" onclick="alternar()">Bloquear Acesso</button>
    </div>

    <script>
        
        function alternar() {
            let atual = localStorage.getItem('loja_ativa') !== 'false';
            localStorage.setItem('loja_ativa', !atual);
            render();
        }

        function render() {
            let ativa = localStorage.getItem('loja_ativa') !== 'false';
            const btn = document.getElementById('btn-toggle');
            const label = document.getElementById('status-label');
            
            label.innerText = ativa ? "ATIVO" : "BLOQUEADO";
            label.style.color = ativa ? "#80ffdb" : "#ff4d6d";
            btn.innerText = ativa ? "Bloquear Loja" : "Ativar Loja";
            btn.className = ativa ? "btn btn-danger w-100" : "btn btn-success w-100";
        }
        render();
    </script>
